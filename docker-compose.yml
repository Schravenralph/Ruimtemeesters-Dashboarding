services:
  db:
    image: postgres:16-alpine
    container_name: dashboarding-postgres
    environment:
      POSTGRES_DB: dashboarding
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "6433:5432"
    volumes:
      - dashboarding-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dashboarding-pgdata:

services:
  app:
    build:
      context: .
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: dashboarding-app
    ports:
      - "127.0.0.1:5022:5022"
    environment:
      NODE_ENV: production
      PORT: 5022
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:?missing DB_PASSWORD in .env}@db:5432/dashboarding
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: dashboarding
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:?missing DB_PASSWORD in .env}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SALES_VIEWER_GRAPHQL_URL: ${SALES_VIEWER_GRAPHQL_URL}
      SALES_VIEWER_GRAPHQL_KEY: ${SALES_VIEWER_GRAPHQL_KEY}
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      TSA_API_URL: http://tsa-engine:8100
      TSA_API_KEY: ${TSA_API_KEY:-rm-tsa-service-2026}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - ruimtemeesters-shared
      # Shared MCP ↔ service fabric. dashboarding-app multi-homes here
      # so rm-mcp-dashboarding can reach it at DNS name dashboarding-app:5022
      # without host.docker.internal. Only the API joins — the DB stays
      # on the default network. See Platform ADR-0006.
      - rm-network

  db:
    image: postgres:16-alpine
    container_name: dashboarding-postgres
    environment:
      POSTGRES_DB: dashboarding
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?missing DB_PASSWORD in .env}
    ports:
      - "127.0.0.1:6433:5432"
    volumes:
      - dashboarding-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default
      - ruimtemeesters-shared

volumes:
  dashboarding-pgdata:

networks:
  ruimtemeesters-shared:
    external: true
  rm-network:
    external: true
    name: rm-network
